<!DOCTYPE html>
<html lang="en" class="scroll-smooth dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>João Oliveira | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    backdropBlur: { xs: '2px' }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 dark:bg-zinc-950 text-gray-800 dark:text-zinc-200 font-sans transition-colors duration-300">

    <!-- Header -->
    <header class="max-w-5xl mx-auto px-6 py-8 flex justify-between items-center">
        <h1 class="text-xl font-bold tracking-tighter dark:text-white">JOÃO OLIVEIRA</h1>
        <button onclick="toggleDarkMode()" class="p-2 rounded-full bg-gray-200 dark:bg-zinc-800 text-gray-800 dark:text-yellow-400">
            <i id="theme-icon" class="fa-solid fa-moon dark:fa-sun"></i>
        </button>
    </header>

    <!-- Main Content (Mantido conforme as capturas anteriores) -->
    <main class="max-w-5xl mx-auto px-6 pb-32">
        <section id="about" class="flex flex-col md:flex-row items-center gap-12 mb-20 pt-10">
            <div class="w-48 h-48 rounded-full overflow-hidden border-4 border-white dark:border-zinc-800 shadow-xl flex-shrink-0">
                <img src="https://via.placeholder.com/150" alt="João Oliveira" class="w-full h-full object-cover">
            </div>
            <div class="text-center md:text-left">
                <h2 class="text-4xl font-extrabold mb-4 dark:text-white">Computer Engineer & Developer</h2>
                <p class="text-lg text-gray-600 dark:text-zinc-400 leading-relaxed max-w-2xl">
                    Dedicated to building efficient software solutions and optimizing systems.
                </p>
            </div>
        </section>

        <!-- Experiência -->
        <section id="experience" class="mb-20">
            <h3 class="text-2xl font-bold mb-8 flex items-center dark:text-white">
                <span class="w-8 h-1 bg-black dark:bg-white mr-4"></span> Experience
            </h3>
            <div class="space-y-8">
                <div class="flex flex-col md:flex-row md:gap-8">
                    <div class="md:w-1/4 mb-1 font-bold text-gray-400 dark:text-zinc-500 text-sm">Jul 2024 - Present</div>
                    <div class="md:w-3/4">
                        <h4 class="text-lg font-bold dark:text-zinc-100">Summer Intern</h4>
                        <p class="text-blue-600 dark:text-blue-400 text-sm font-medium">Babel</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Botão Flutuante (FAB) Sticky -->
    <div class="fixed bottom-8 left-0 right-0 flex justify-center z-50 pointer-events-none">
        <button id="menu-btn" class="pointer-events-auto flex items-center gap-2 px-6 py-3 rounded-full bg-white/70 dark:bg-zinc-800/70 backdrop-blur-md border border-white/20 dark:border-zinc-700/30 shadow-2xl text-black dark:text-white font-bold text-xs tracking-widest hover:scale-105 transition-all duration-300">
            <i class="fa-solid fa-grid-2"></i>
            <span>MENU</span>
        </button>
    </div>

    <!-- Modal de Navegação Grid 2x2 -->
    <div id="menu-modal" class="fixed inset-0 z-[60] hidden flex items-center justify-center p-6">
        <div id="modal-overlay" class="absolute inset-0 bg-black/40 dark:bg-black/80 backdrop-blur-sm"></div>
        
        <div class="relative w-full max-w-xs bg-white dark:bg-zinc-900 rounded-[2rem] p-6 shadow-2xl border border-gray-100 dark:border-zinc-800">
            <div class="flex justify-between items-center mb-6 px-2">
                <span class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-400">Navigation</span>
                <button id="close-btn" class="text-gray-400 hover:text-black dark:hover:text-white"><i class="fa-solid fa-xmark"></i></button>
            </div>
            
            <!-- Grid 2x2 -->
            <nav class="grid grid-cols-2 gap-3">
                <a href="#about" class="menu-link flex flex-col items-center justify-center aspect-square bg-gray-50 dark:bg-zinc-800/50 rounded-2xl border border-transparent hover:border-blue-500 transition-all group active:scale-95">
                    <i class="fa-solid fa-user mb-2 text-gray-400 group-hover:text-blue-500 transition-colors"></i>
                    <span class="text-[11px] font-bold dark:text-zinc-200">About</span>
                </a>
                <a href="#experience" class="menu-link flex flex-col items-center justify-center aspect-square bg-gray-50 dark:bg-zinc-800/50 rounded-2xl border border-transparent hover:border-blue-500 transition-all group active:scale-95">
                    <i class="fa-solid fa-briefcase mb-2 text-gray-400 group-hover:text-blue-500 transition-colors"></i>
                    <span class="text-[11px] font-bold dark:text-zinc-200">Experience</span>
                </a>
                <a href="#education" class="menu-link flex flex-col items-center justify-center aspect-square bg-gray-50 dark:bg-zinc-800/50 rounded-2xl border border-transparent hover:border-blue-500 transition-all group active:scale-95">
                    <i class="fa-solid fa-graduation-cap mb-2 text-gray-400 group-hover:text-blue-500 transition-colors"></i>
                    <span class="text-[11px] font-bold dark:text-zinc-200">Education</span>
                </a>
                <a href="mailto:joao.97.oliveira@gmail.com" class="menu-link flex flex-col items-center justify-center aspect-square bg-blue-600 rounded-2xl hover:bg-blue-700 transition-all active:scale-95">
                    <i class="fa-solid fa-paper-plane mb-2 text-white"></i>
                    <span class="text-[11px] font-bold text-white">Contact</span>
                </a>
            </nav>
        </div>
    </div>

    <script>
        const menuBtn = document.getElementById('menu-btn');
        const menuModal = document.getElementById('menu-modal');
        const closeBtn = document.getElementById('close-btn');
        const overlay = document.getElementById('modal-overlay');
        const links = document.querySelectorAll('.menu-link');

        function toggleModal() {
            menuModal.classList.toggle('hidden');
            document.body.classList.toggle('overflow-hidden');
        }

        menuBtn.addEventListener('click', toggleModal);
        closeBtn.addEventListener('click', toggleModal);
        overlay.addEventListener('click', toggleModal);
        links.forEach(link => link.addEventListener('click', toggleModal));

        function toggleDarkMode() {
            const html = document.documentElement;
            const themeIcon = document.getElementById('theme-icon');
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                themeIcon.classList.replace('fa-sun', 'fa-moon');
            } else {
                html.classList.add('dark');
                themeIcon.classList.replace('fa-moon', 'fa-sun');
            }
        }
    </script>
</body>
</html>
