<!DOCTYPE html>
<html lang="en" class="scroll-smooth dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>João Oliveira | Portfolio</title>
    <meta name="description" content="João Oliveira - Computer Engineering Student and Software Developer Portfolio">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'charcoal': '#121212',
                        'soft-beige': '#F5F5DC',
                    },
                    backdropBlur: { xs: '2px' }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body class="bg-[#F5F5DC] dark:bg-[#121212] text-gray-800 dark:text-zinc-200 font-sans transition-colors duration-300">

    <header class="max-w-5xl mx-auto px-6 py-8 flex justify-between items-center">
        <h1 class="text-xl font-bold tracking-tighter dark:text-white uppercase">
            João Oliveira
        </h1>

        <div class="flex items-center gap-4">
            <button id="lang-toggle" class="text-sm font-bold hover:text-blue-600 transition dark:text-zinc-400 dark:hover:text-white">
                EN / PT
            </button>

            <button id="theme-toggle" class="p-2 rounded-full bg-gray-200 dark:bg-zinc-800 text-gray-800 dark:text-yellow-400 hover:scale-110 transition" aria-label="Toggle Dark Mode">
                <i id="theme-icon" class="fa-solid fa-moon"></i>
            </button>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-6 pb-40">
        <section id="about" class="flex flex-col md:flex-row items-center gap-12 mb-24 pt-10">
            <div class="w-48 h-48 rounded-full overflow-hidden border-4 border-white dark:border-zinc-800 shadow-2xl flex-shrink-0">
                <img src="https://via.placeholder.com/300" alt="João Oliveira" class="w-full h-full object-cover">
            </div>
            <div class="text-center md:text-left">
                <h2 id="hero-title" class="text-4xl md:text-5xl font-extrabold mb-4 dark:text-white tracking-tight"></h2>
                <p id="hero-desc" class="text-lg text-gray-600 dark:text-zinc-400 leading-relaxed max-w-2xl"></p>
                <div class="flex items-center justify-center md:justify-start gap-3 mt-4">
                    <i class="fa-solid fa-envelope"></i> joao.97.oliveira@gmail.com
                </div>
                <div class="mt-8 flex justify-center md:justify-start gap-6">
                    <a href="https://github.com/JChorao" target="_blank" class="text-2xl hover:text-black dark:hover:text-white transition"><i class="fab fa-github"></i></a>
                    <a href="https://linkedin.com/in/joao-oliveira-4462b2231" target="_blank" class="text-2xl hover:text-blue-600 transition"><i class="fab fa-linkedin"></i></a>
                </div>
            </div>
        </section>

        <section id="experience" class="mb-24">
            <h3 class="text-2xl font-bold mb-10 flex items-center dark:text-white">
                <span class="w-8 h-1 bg-black dark:bg-white mr-4"></span>
                <span id="exp-title"></span>
            </h3>
            <div id="exp-list" class="space-y-12"></div>
        </section>

        <section id="education" class="mb-24">
            <h3 class="text-2xl font-bold mb-10 flex items-center dark:text-white">
                <span class="w-8 h-1 bg-black dark:bg-white mr-4"></span>
                <span id="edu-title"></span>
            </h3>
            <div id="edu-list" class="space-y-12"></div>
        </section>

        <section id="projects" class="mb-24">
            <h3 class="text-2xl font-bold mb-10 flex items-center dark:text-white">
                <span class="w-8 h-1 bg-black dark:bg-white mr-4"></span>
                <span id="proj-title"></span>
            </h3>
            <div id="proj-grid" class="grid md:grid-cols-2 gap-6"></div>
        </section>

        <section id="skills" class="mb-24">
            <h3 class="text-2xl font-bold mb-10 flex items-center dark:text-white">
                <span class="w-8 h-1 bg-black dark:bg-white mr-4"></span>
                <span id="skills-title"></span>
            </h3>
            <div id="skills-list" class="flex flex-wrap justify-center gap-4"></div>
        </section>

        <section id="contact" class="mb-10 mt-32 flex flex-col items-center justify-center text-center">
            <h3 class="text-2xl font-bold mb-6 flex items-center justify-center dark:text-white">
                <span id="contact-title"></span>
            </h3>
            <p id="contact-desc" class="text-gray-600 dark:text-zinc-400 mb-8 max-w-lg"></p>
            <a href="https://linkedin.com/in/joao-oliveira-4462b2231" target="_blank" class="inline-flex items-center gap-3 px-8 py-4 bg-[#0077b5] text-white rounded-full font-bold hover:bg-[#005582] transition-colors shadow-lg">
                <i class="fab fa-linkedin text-2xl"></i>
                <span id="contact-btn"></span>
            </a>
        </section>
    </main>

    <div id="projects-modal" class="fixed inset-0 z-[70] hidden flex items-center justify-center p-6">
        <div id="projects-overlay" class="absolute inset-0 bg-black/60 backdrop-blur-md"></div>
        <div class="relative w-full max-w-2xl bg-white dark:bg-zinc-900 rounded-[2.5rem] p-8 shadow-2xl border border-gray-100 dark:border-zinc-800">
            <h3 id="sub-projects-title" class="text-2xl font-bold mb-6 dark:text-white">Personal GitHub Projects</h3>
            <div id="sub-projects-list" class="space-y-4"></div>
            <button id="close-projects" class="mt-8 w-full py-3 rounded-2xl bg-gray-100 dark:bg-zinc-800 font-bold hover:bg-gray-200 dark:hover:bg-zinc-700 transition-colors">Fechar</button>
        </div>
    </div>

    <div id="nav-menu" class="fixed inset-0 z-[80] hidden items-center justify-center p-4">
        <div id="close-menu" class="absolute inset-0 bg-black/80 backdrop-blur-sm cursor-pointer"></div>
        
        <div class="relative w-[90%] md:w-[40%] bg-[#18181b] rounded-[2rem] p-6 shadow-2xl border border-white/5">
            <nav class="grid grid-cols-2 gap-4">
                <a href="#about" class="menu-link flex flex-col items-center justify-center py-8 bg-[#27272a] hover:bg-[#3f3f46] rounded-2xl transition-all group">
                    <i class="fa-solid fa-user text-3xl mb-3 text-zinc-400 group-hover:text-white transition-colors"></i>
                    <span id="nav-about" class="text-sm font-bold text-zinc-400 group-hover:text-white transition-colors"></span>
                </a>
                <a href="#experience" class="menu-link flex flex-col items-center justify-center py-8 bg-[#27272a] hover:bg-[#3f3f46] rounded-2xl transition-all group">
                    <i class="fa-solid fa-briefcase text-3xl mb-3 text-zinc-400 group-hover:text-white transition-colors"></i>
                    <span id="nav-work" class="text-sm font-bold text-zinc-400 group-hover:text-white transition-colors"></span>
                </a>
                <a href="#education" class="menu-link flex flex-col items-center justify-center py-8 bg-[#27272a] hover:bg-[#3f3f46] rounded-2xl transition-all group">
                    <i class="fa-solid fa-graduation-cap text-3xl mb-3 text-zinc-400 group-hover:text-white transition-colors"></i>
                    <span id="nav-education" class="text-sm font-bold text-zinc-400 group-hover:text-white transition-colors"></span>
                </a>
                <a href="#projects" class="menu-link flex flex-col items-center justify-center py-8 bg-[#27272a] hover:bg-[#3f3f46] rounded-2xl transition-all group">
                    <i class="fa-solid fa-code text-3xl mb-3 text-zinc-400 group-hover:text-white transition-colors"></i>
                    <span id="nav-projects" class="text-sm font-bold text-zinc-400 group-hover:text-white transition-colors"></span>
                </a>
                <a href="#skills" class="menu-link flex flex-col items-center justify-center py-8 bg-[#27272a] hover:bg-[#3f3f46] rounded-2xl transition-all group">
                    <i class="fa-solid fa-laptop-code text-3xl mb-3 text-zinc-400 group-hover:text-white transition-colors"></i>
                    <span id="nav-skills" class="text-sm font-bold text-zinc-400 group-hover:text-white transition-colors"></span>
                </a>
                <a href="#contact" class="menu-link flex flex-col items-center justify-center py-8 bg-[#27272a] hover:bg-[#3f3f46] rounded-2xl transition-all group">
                    <i class="fa-solid fa-envelope text-3xl mb-3 text-zinc-400 group-hover:text-white transition-colors"></i>
                    <span id="nav-contact" class="text-sm font-bold text-zinc-400 group-hover:text-white transition-colors"></span>
                </a>
            </nav>
        </div>
    </div>

    <div class="fixed bottom-8 left-0 right-0 flex justify-center z-50 pointer-events-none">
        <button id="menu-btn" class="pointer-events-auto flex items-center gap-2 px-6 py-3 rounded-full bg-white/70 dark:bg-zinc-800/70 backdrop-blur-md border border-white/20 dark:border-zinc-700/30 shadow-2xl text-black dark:text-white font-bold text-[10px] tracking-[0.2em] hover:scale-105 transition-all">
            <i class="fa-solid fa-bars"></i>
            <span id="menu-label">MENU</span>
        </button>
    </div>

    <script>
        let currentLang = 'en';
        let contentData = {};

        async function loadLanguage(lang) {
            try {
                const response = await fetch(`lang/${lang}.json`);
                contentData[lang] = await response.json();
                if (currentLang === lang) updateContent();
            } catch (error) {
                console.error("Erro ao carregar idioma:", error);
            }
        }

        function updateContent() {
            const data = contentData[currentLang];
            if (!data) return;

            document.getElementById('hero-title').textContent = data.heroTitle;
            document.getElementById('hero-desc').textContent = data.heroDesc;
            document.getElementById('exp-title').textContent = data.expTitle;
            document.getElementById('edu-title').textContent = data.eduTitle;
            document.getElementById('proj-title').textContent = data.projTitle;
            document.getElementById('skills-title').textContent = data.skillsTitle;
            document.getElementById('contact-title').textContent = data.contactTitle;
            document.getElementById('contact-desc').textContent = data.contactDesc;
            document.getElementById('contact-btn').textContent = data.contactBtn;
            document.getElementById('menu-label').textContent = data.menuLabel;

            // Traduções do Menu de Navegação
            document.getElementById('nav-about').textContent = data.nav.about;
            document.getElementById('nav-work').textContent = data.nav.work;
            document.getElementById('nav-education').textContent = data.nav.education;
            document.getElementById('nav-projects').textContent = data.nav.projects;
            document.getElementById('nav-skills').textContent = data.nav.skills;
            document.getElementById('nav-contact').textContent = data.nav.contact;

            const projGrid = document.getElementById('proj-grid');
            projGrid.innerHTML = data.projects.map((proj, index) => {
                const action = proj.subProjects ? `onclick="openSubProjects(${index})"` : `onclick="window.open('${proj.link}', '_blank')"`;
                return `
                    <div ${action} class="cursor-pointer bg-white/50 dark:bg-zinc-900/50 p-8 rounded-3xl border border-blue-500/30 dark:border-blue-400/30 shadow-lg hover:scale-[1.02] transition-all group relative">
                        <div class="absolute top-0 right-0 bg-blue-500 text-white text-[10px] font-bold px-3 py-1 rounded-bl-lg uppercase tracking-wider">${proj.tag}</div>
                        <h4 class="font-bold text-lg dark:text-zinc-100 group-hover:text-blue-600 transition-colors">${proj.title}</h4>
                        <p class="text-gray-600 dark:text-zinc-400 text-sm mt-3 leading-relaxed">${proj.desc}</p>
                        <div class="mt-6 flex flex-wrap gap-2">
                            ${proj.techs.map(t => `<span class="text-xs px-3 py-1 rounded-full bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400">${t}</span>`).join('')}
                        </div>
                    </div>
                `;
            }).join('');

            document.getElementById('exp-list').innerHTML = data.experiences.map(exp => `
                <div class="flex flex-col md:flex-row md:gap-8 border-t border-gray-100 dark:border-zinc-800 pt-8 first:border-0 first:pt-0">
                    <div class="md:w-1/4 mb-2 font-bold text-gray-400 dark:text-zinc-600 text-sm">${exp.date}</div>
                    <div class="md:w-3/4">
                        <h4 class="text-xl font-bold dark:text-zinc-100">${exp.role}</h4>
                        <p class="text-blue-600 dark:text-blue-400 font-medium mb-2">${exp.company}</p>
                        <p class="text-gray-600 dark:text-zinc-400 leading-relaxed text-sm">${exp.desc}</p>
                    </div>
                </div>
            `).join('');

            document.getElementById('edu-list').innerHTML = data.education.map(edu => `
                <div class="flex flex-col md:flex-row md:gap-8 border-t border-gray-100 dark:border-zinc-800 pt-8 first:border-0 first:pt-0">
                    <div class="md:w-1/4 mb-2 font-bold text-gray-400 dark:text-zinc-600 text-sm">${edu.date}</div>
                    <div class="md:w-3/4">
                        <h4 class="text-xl font-bold dark:text-zinc-100">${edu.degree}</h4>
                        <p class="text-blue-600 dark:text-blue-400 font-medium">${edu.school}</p>
                    </div>
                </div>
            `).join('');

            document.getElementById('skills-list').innerHTML = data.skills.map(skill => `
                <div class="bg-white dark:bg-zinc-900 px-8 py-4 rounded-2xl border border-gray-100 dark:border-zinc-800 text-center font-medium shadow-sm">
                    ${skill}
                </div>
            `).join('');
        }

        function openSubProjects(index) {
            const data = contentData[currentLang].projects[index];
            const list = document.getElementById('sub-projects-list');
            list.innerHTML = data.subProjects.map(sub => `
                <a href="${sub.link}" target="_blank" class="block p-4 rounded-2xl border border-gray-100 dark:border-zinc-800 hover:border-blue-500 transition-all bg-gray-50 dark:bg-zinc-800/30 group">
                    <div class="flex justify-between items-center">
                        <h5 class="font-bold dark:text-white group-hover:text-blue-500">${sub.title}</h5>
                        <i class="fa-solid fa-external-link text-xs text-gray-400"></i>
                    </div>
                    <p class="text-sm text-gray-600 dark:text-zinc-400 mt-1">${sub.desc}</p>
                    <div class="flex gap-2 mt-2">
                        ${sub.techs.map(t => `<span class="text-[10px] text-blue-500 font-mono">${t}</span>`).join('')}
                    </div>
                </a>
            `).join('');
            document.getElementById('projects-modal').classList.remove('hidden');
        }

        document.getElementById('close-projects').addEventListener('click', () => {
            document.getElementById('projects-modal').classList.add('hidden');
        });

        document.getElementById('lang-toggle').addEventListener('click', () => {
            currentLang = currentLang === 'pt' ? 'en' : 'pt';
            updateContent();
        });

        document.getElementById('theme-toggle').addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            const icon = document.getElementById('theme-icon');
            icon.classList.toggle('fa-moon');
            icon.classList.toggle('fa-sun');
        });

        // Lógica para o Menu de Navegação
        const navMenu = document.getElementById('nav-menu');
        
        function toggleMenu() {
            if (navMenu.classList.contains('hidden')) {
                navMenu.classList.remove('hidden');
                navMenu.classList.add('flex');
            } else {
                navMenu.classList.add('hidden');
                navMenu.classList.remove('flex');
            }
        }

        document.getElementById('menu-btn').addEventListener('click', toggleMenu);
        document.getElementById('close-menu').addEventListener('click', toggleMenu); // Fechar ao clicar no fundo

        // Fecha o menu ao clicar num dos links
        document.querySelectorAll('.menu-link').forEach(link => {
            link.addEventListener('click', toggleMenu);
        });

        loadLanguage('en');
        loadLanguage('pt');
    </script>
</body>
</html>
